<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"> <!-- declares UTF-8 character encoding -->
  <title>Page Not Found – Sela’s Creations</title>
  <!-- sets the browser tab title -->

  <!-- ensures mobile devices treat the page width as the device width -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- short description used by search engines and link previews -->
  <meta name="description" content="Page not found – Sela’s Creations.">

  <!-- shared stylesheet for consistent multi-page styling -->
  <link rel="stylesheet" href="assets/style.css">
</head>

<body>
<main class="card card--notfound">

  <!-- navigation links at the top of the card -->
  <nav class="site-nav" aria-label="Primary navigation">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="programming-projects.html">Programming</a>
    <a href="screenwriting-projects.html">Screenwriting</a>
  </nav>

  <!--
    logo block uses SVG first, then PNG as a fallback image.
    this keeps visual quality high while preserving a safe fallback path.
  -->
  <div class="logo-wrap">
    <picture>
      <source
        srcset="assets/scbutterflyc13effff-10mm-angle-full-logo-2.svg"
        type="image/svg+xml">
      <img src="assets/scbutterflyc13effff-10mm-angle-full-logo-2.png"
           alt="Sela’s Creations logo">
    </picture>
  </div>

  <!-- 404 replacement for tagline -->
  <div class="error-title">404 – Page Not Found</div>
  <div class="error-sub">Oops! That page flew away…</div>

  <!-- footer at bottom -->
  <footer class="site-footer">
    © 2025 Sela’s Creations. All rights reserved.
  </footer>

</main>
</body>
</html>
