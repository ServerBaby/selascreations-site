<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"> <!-- declares UTF-8 character encoding -->
  <title>Page Not Found – Sela’s Creations</title>
  <!-- sets the browser tab title -->

  <!-- ensures mobile devices treat the page width as the device width -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- short description used by search engines and link previews -->
  <meta name="description" content="Page not found – Sela’s Creations.">

  <!-- shared stylesheet for consistent multi-page styling -->
  <link rel="stylesheet" href="assets/style.css">
</head>

<body>
<div class="card-frame">
<main class="card card--wide card--projects">

  <!-- navigation links at the top of the card -->
  <nav class="site-nav" aria-label="Primary navigation">
    <a href="home.html">Home</a>
    <a class="site-nav-contact" href="home.html">Contact</a>
    <a href="about.html">About</a>
    <a href="screenwriting.html">Screenwriting</a>
    <a href="programming.html">Programming</a>
  </nav>

  <!--
    logo block uses SVG in landscape, then PNG as a mobile fallback.
    this avoids mobile font substitution while preserving a safe fallback path.
  -->
  <div class="logo-wrap">
    <picture>
      <source
        srcset="assets/scbutterflyc13effff-10mm-angle-full-logo-2.svg"
        media="(orientation: landscape)"
        type="image/svg+xml">
      <img src="assets/scbutterflyc13effff-10mm-angle-full-logo-2.png"
           alt="Sela’s Creations logo">
    </picture>
  </div>

  <!--
    404 content box mirrors the Programming Projects placeholder area.
    only the message text changes; the layout uses the same card positions.
  -->
  <section class="project-preview-box" aria-label="Page not found message">
    <div class="project-preview-inner">
      <div class="notfound-message">
        <div class="error-title">404 – Page Not Found</div>
        <div class="error-sub">Oops! That page flew away…</div>
      </div>
    </div>
  </section>

  <!-- footer at bottom -->
  <footer class="site-footer">
    © 2025 Sela’s Creations. All rights reserved.
  </footer>

</main>
</div>
</body>
</html>
