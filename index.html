<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"> <!-- declares UTF-8 character encoding -->
  <title>Sela’s Creations</title> <!-- sets the browser tab title -->

  <!-- ensures mobile devices treat the page width as the device width -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- short description used by search engines and link previews -->
  <meta name="description"
        content="Sela’s Creations – Screenwriter & Programmer in Australia.">

  <!-- shared stylesheet for consistent multi-page styling -->
  <link rel="stylesheet" href="assets/style.css">
</head>

<body>
<div class="card-frame">
<main class="card card--home">

  <!--
    logo block uses SVG in landscape, then PNG as a mobile fallback.
    this avoids mobile font substitution while preserving a safe fallback path.
  -->
  <div class="logo-wrap">
    <picture>
      <source
        srcset="assets/scbutterflyc13effff-10mm-angle-full-logo-2.svg"
        media="(orientation: landscape)"
        type="image/svg+xml">
      <img src="assets/scbutterflyc13effff-10mm-angle-full-logo-2.png"
           alt="Sela’s Creations logo">
    </picture>
  </div>

  <!-- tagline positioned independently on the card -->
  <div class="hero-line">Screenwriter &nbsp; | &nbsp; Programmer</div>

  <!-- entry link opens the main site home page from the landing card -->
  <a class="enter-link" href="home.html" data-label="Enter Site"
     aria-label="Enter Site"></a>

  <!-- footer text at the bottom of the card -->
  <footer class="site-footer">
    © 2025 Sela’s Creations. All rights reserved.
  </footer>

</main>
</div>
</body>
</html>
